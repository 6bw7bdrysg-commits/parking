<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koinon Parking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .my-location-btn { position: absolute; top: 50px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-action { background-color: #28a745; color: white; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; border-radius: 8px; }
        .nav-btn { background-color: #007bff; color: white; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; border-radius: 8px; }
        .occupy-btn { background-color: #dc3545; color: white; border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <h2>Καλώς ήρθες!</h2>
        <input type="text" id="usernameInput" placeholder="Δώσε ένα όνομα..." style="padding:10px; width:80%; margin-bottom:10px;">
        <button class="btn-action" style="width:80%" onclick="login()">Σύνδεση</button>
    </div>
    <div id="map"></div>
    <div class="my-location-btn" onclick="resetUserMarker()">📍 Επαναφορά μου</div>
    
    <script>
        const API_BASE_URL = "https://parking-mhsn.onrender.com";
        var map = L.map('map').setView([39.6384, 22.4152], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
        var markers = [], userMarker = null;

        async function login() {
            const username = document.getElementById('usernameInput').value;
            if (!username) return alert("Βάλε ένα όνομα!");
            let res = await fetch(`${API_BASE_URL}/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username }) });
            let data = await res.json();
            localStorage.setItem('userId', data.user_id);
            document.getElementById('loginOverlay').style.display = 'none';
            resetUserMarker();
            loadSpots();
        }

        function resetUserMarker() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (userMarker) {
                    userMarker.setLatLng([lat, lng]);
                } else {
                    // Η πινέζα σου έχει ΜΟΝΟ επιλογές αποθήκευσης/δημοσίευσης
                    userMarker = L.marker([lat, lng], { draggable: true }).addTo(map)
                        .bindPopup(`<b>Εδώ είμαι!</b><br>
                            <button class="btn-action" onclick="saveSpot(true, ${lat}, ${lng})">📢 Δημοσίευση</button>
                            <button class="nav-btn" onclick="saveSpot(false, ${lat}, ${lng})">💾 Αποθήκευση</button>`);
                }
                map.setView([lat, lng], 17);
            });
        }

        async function saveSpot(isPublic, lat, lng) {
            let pos = userMarker.getLatLng();
            let mins = isPublic ? prompt("Λεπτά;", "10") : 0;
            await fetch(`${API_BASE_URL}/free-spot`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: parseInt(localStorage.getItem('userId')), latitude: pos.lat, longitude: pos.lng, minutes_until_free: parseInt(mins), is_public: isPublic })
            });
            loadSpots();
        }

        async function loadSpots() {
            if (!localStorage.getItem('userId')) return;
            let res = await fetch(`${API_BASE_URL}/search-spots?user_id=${localStorage.getItem('userId')}`);
            let data = await res.json();
            markers.forEach(m => map.removeLayer(m));
            markers = []; 
            data.spots.forEach(spot => {
                let color = spot.is_public ? 'green' : 'violet';
                let marker = L.marker([spot.latitude, spot.longitude], {
                    icon: new L.Icon({iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`, iconSize:[25,41]}),
                    draggable: false // ΜΟΝΙΜΗ - ΔΕΝ ΚΟΥΝΙΕΤΑΙ
                }).addTo(map)
                .bindPopup(`<b>${spot.is_public ? 'Δημόσια' : 'Αποθηκευμένη'}</b><br>
                ${!spot.is_public ? `<button class="btn-action" onclick="publishSpot(${spot.id})">📢 Δημοσίευση</button>` : ''}
                <button class="occupy-btn" onclick="deleteSpot(${spot.id})">❌ Διαγραφή</button>`);
                markers.push(marker);
            });
        }

        async function publishSpot(id) {
            await fetch(`${API_BASE_URL}/publish-spot/${id}`, { method: 'POST' });
            loadSpots();
        }
        
        async function deleteSpot(id) {
            await fetch(`${API_BASE_URL}/occupy-spot/${id}`, { method: 'DELETE' });
            loadSpots();
        }

        window.onload = () => { if (localStorage.getItem('userId')) { resetUserMarker(); loadSpots(); } };
    </script>
</body>
</html>
