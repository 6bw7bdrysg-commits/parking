<script>
        const API_BASE_URL = "https://parking-mhsn.onrender.com";
        var map = L.map('map', { maxZoom: 19, minZoom: 3 }).setView([39.6384, 22.4152], 16);
        var savedPosition = null;
        var markers = [];
        var userMarker = null;
        var savedMarker = null; // Νέα μεταβλητή για την αποθηκευμένη πινέζα

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri',
            maxZoom: 19
        }).addTo(map);

        window.addEventListener('resize', () => map.invalidateSize());

        function loadSavedPosition() {
            const lat = localStorage.getItem('savedLat');
            const lng = localStorage.getItem('savedLng');
            if (lat && lng) {
                savedPosition = { lat: parseFloat(lat), lng: parseFloat(lng) };
                showSavedMarker(); // Εμφάνιση της πινέζας αν υπάρχει αποθηκευμένη
            }
        }

        // Συνάρτηση για την εμφάνιση της αποθηκευμένης πινέζας
        function showSavedMarker() {
            if (savedPosition) {
                if (savedMarker) map.removeLayer(savedMarker);
                savedMarker = L.marker([savedPosition.lat, savedPosition.lng], {
                    icon: new L.Icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    })
                }).addTo(map).bindPopup("<b>Αποθηκευμένη θέση</b>");
            }
        }

        function resetUserMarker() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    if (userMarker) {
                        userMarker.setLatLng([lat, lng]);
                    } else {
                        userMarker = L.marker([lat, lng], { draggable: true }).addTo(map);
                    }
                    userMarker.bindPopup(getUserPopupContent()).openPopup();
                    map.setView([lat, lng], 17);
                }, null, { enableHighAccuracy: true });
            }
        }

        function getUserPopupContent() {
            let html = `<div style="text-align:center;"><b>Είσαι εδώ!</b><br>
                <button class="save-btn" onclick="saveCurrentLocation()">💾 Αποθήκευση θέσης</button>
                <input type="file" id="photoInput" accept="image/*" style="width:100%; margin:5px 0;">
                <button class="btn-action" onclick="submitPosition(true)">📢 Δημοσίευσε Τώρα</button>`;
            if (savedPosition) {
                html += `<button class="btn-action" style="background:#6c757d;" onclick="publishSaved()">📤 Δημοσίευσε την αποθηκευμένη</button>`;
            }
            html += `</div>`;
            return html;
        }

        function saveCurrentLocation() {
            let pos = userMarker.getLatLng();
            localStorage.setItem('savedLat', pos.lat);
            localStorage.setItem('savedLng', pos.lng);
            savedPosition = pos;
            showSavedMarker(); // Εμφάνιση της πινέζας στον χάρτη
            alert("Η θέση αποθηκεύτηκε μόνιμα!");
            userMarker.setPopupContent(getUserPopupContent()).openPopup();
        }

        function publishSaved() {
            if (savedPosition) {
                let mins = prompt("Πόσα λεπτά θα είσαι ελεύθερος;", "10");
                if (mins) {
                    sendToServer(savedPosition.lat, savedPosition.lng, mins, null);
                    localStorage.removeItem('savedLat');
                    localStorage.removeItem('savedLng');
                    if (savedMarker) map.removeLayer(savedMarker); // Αφαίρεση πινέζας
                    savedPosition = null;
                    userMarker.setPopupContent(getUserPopupContent()).openPopup();
                }
            }
        }

        function submitPosition(isUserMarker) {
            const file = document.getElementById(isUserMarker ? 'photoInput' : 'clickPhotoInput').files[0];
            const pos = isUserMarker ? userMarker.getLatLng() : lastClickedLatLng;
            let mins = prompt("Πόσα λεπτά θα είσαι ελεύθερος;", "10");
            
            if (mins) {
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => sendToServer(pos.lat, pos.lng, mins, reader.result);
                    reader.readAsDataURL(file);
                } else { sendToServer(pos.lat, pos.lng, mins, null); }
            }
        }

        var lastClickedLatLng = null;
        map.on('click', function(e) {
            lastClickedLatLng = e.latlng;
            L.popup().setLatLng(e.latlng).setContent(`
                <div style="text-align:center;"><b>Νέα θέση</b><br>
                <input type="file" id="clickPhotoInput" accept="image/*" style="width:100%; margin:5px 0;">
                <button class="btn-action" onclick="submitPosition(false)">📢 Δημοσίευσε</button></div>
            `).openOn(map);
        });

        function getDirections(lat, lng) {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`, '_blank');
        }

        async function sendToServer(lat, lng, mins, photo) {
            await fetch(`${API_BASE_URL}/free-spot`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: 1, latitude: lat, longitude: lng, minutes_until_free: parseInt(mins), photo: photo})
            });
            map.closePopup();
            loadSpots();
        }

        async function loadSpots() {
            let res = await fetch(`${API_BASE_URL}/search-spots?user_id=1`);
            let data = await res.json();
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            data.spots.forEach(spot => {
                let created = new Date(spot.created_at + "Z");
                let remaining = spot.minutes_until_free - Math.floor((new Date() - created) / 60000);
                if (remaining > 0) {
                    let color = remaining <= 3 ? 'red' : 'green';
                    let icon = new L.Icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });
                    let photoHtml = spot.photo ? `<img src="${spot.photo}" class="photo-preview"><br>` : "";
                    let marker = L.marker([spot.latitude, spot.longitude], {icon: icon}).addTo(map)
                        .bindPopup(`${photoHtml}<b>Λήγει σε: ${remaining} λεπτά</b><br><button class="nav-btn" onclick="getDirections(${spot.latitude}, ${spot.longitude})">🚗 Οδηγίες</button><button class="occupy-btn" onclick="occupySpot(${spot.id})">❌ Κατειλημμένη</button>`);
                    markers.push(marker);
                }
            });
        }

        async function occupySpot(id) {
            await fetch(`${API_BASE_URL}/occupy-spot/${id}`, { method: 'DELETE' });
            loadSpots();
        }

        // Εκκίνηση
        loadSavedPosition();
        resetUserMarker();
        loadSpots();
        setInterval(loadSpots, 5000);
    </script>
