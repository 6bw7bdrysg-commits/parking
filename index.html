<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koinon Parking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .marquee-container {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 10px 0; overflow: hidden; z-index: 2000;
            white-space: nowrap; pointer-events: none;
        }
        .marquee-text {
            display: inline-block; padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        
        .my-location-btn {
            position: absolute; top: 60px; right: 10px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
            cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .btn-action, .nav-btn, .occupy-btn, .save-btn { 
            border: none; padding: 12px; width: 100%; margin-top: 8px; 
            cursor: pointer; font-size: 16px; border-radius: 8px; font-weight: bold;
        }
        .btn-action { background-color: #28a745; color: white; }
        .nav-btn { background-color: #007bff; color: white; }
        .occupy-btn { background-color: #dc3545; color: white; }
        .save-btn { background-color: #ffc107; color: black; }
        .photo-preview { max-width: 100%; display: block; margin: 5px auto; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee-text">
            ⚠️ Προσοχή: Η διαθεσιμότητα των θέσεων δεν είναι εγγυημένη 100%! | Δημοσιεύστε μια θέση που αδειάζει | Βοηθήστε την κοινότητα!
        </div>
    </div>

    <div id="map"></div>
    <div class="my-location-btn" onclick="resetUserMarker()">📍 Επαναφορά μου</div>
    
    <script>
        const API_BASE_URL = "https://parking-mhsn.onrender.com";
        var map = L.map('map', { maxZoom: 19, minZoom: 3 }).setView([39.6384, 22.4152], 16);
        var savedPosition = null;
        
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri',
            maxZoom: 19
        }).addTo(map);

        window.addEventListener('resize', () => map.invalidateSize());

        var markers = [];
        var userMarker = null;

        function resetUserMarker() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    if (userMarker) {
                        userMarker.setLatLng([lat, lng]);
                    } else {
                        userMarker = L.marker([lat, lng], { draggable: true }).addTo(map);
                    }
                    userMarker.bindPopup(getUserPopupContent()).openPopup();
                    map.setView([lat, lng], 17);
                }, null, { enableHighAccuracy: true });
            }
        }

        function getUserPopupContent() {
            let html = `<div style="text-align:center;"><b>Είσαι εδώ!</b><br>
                <button class="save-btn" onclick="saveCurrentLocation()">💾 Αποθήκευση θέσης</button>
                <input type="file" id="photoInput" accept="image/*" style="width:100%; margin:5px 0;">
                <button class="btn-action" onclick="submitPosition(true)">📢 Δημοσίευσε Τώρα</button>`;
            if (savedPosition) {
                html += `<button class="btn-action" style="background:#6c757d;" onclick="publishSaved()">📤 Δημοσίευσε την αποθηκευμένη</button>`;
            }
            html += `</div>`;
            return html;
        }

            savedPosition = userMarker.getLatLng();
            alert("Η θέση αποθηκεύτηκε!");
            userMarker.setPopupContent(getUserPopupContent()).openPopup();
        }

                    savedPosition = null;
                }
