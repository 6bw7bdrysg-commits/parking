<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koinon Parking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .cancel-btn { background-color: #6c757d; color: white; }
        .marquee-container {
            position: absolute; top: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 10px 0; overflow: hidden; z-index: 2000;
            white-space: nowrap; pointer-events: none;
        }
        .marquee-text {
            display: inline-block; padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
        
        /* Container για τα κουμπιά - τοποθέτηση αριστερά κάτω από το marquee */
        .controls-container {
            position: absolute; top: 60px; left: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .menu-btn, .my-location-btn {
            background: white; padding: 10px 15px; border-radius: 5px;
            cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-align: center; pointer-events: auto;
        }
        
        /* Μενού Overlay */
        #menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 250px; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 3000; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.3);
        }
        .close-menu { cursor: pointer; color: red; font-size: 20px; font-weight: bold; margin-bottom: 20px; }

        .btn-action, .nav-btn, .occupy-btn, .save-btn { 
            border: none; padding: 12px; width: 100%; margin-top: 8px; 
            cursor: pointer; font-size: 16px; border-radius: 8px; font-weight: bold;
        }
        .btn-action { background-color: #28a745; color: white; }
        .nav-btn { background-color: #007bff; color: white; }
        .occupy-btn { background-color: #dc3545; color: white; }
        .save-btn { background-color: #ffc107; color: black; }
        .photo-preview { max-width: 100%; display: block; margin: 5px auto; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="marquee-container">
        <div class="marquee-text">
            ⚠️ Προσοχή: Η διαθεσιμότητα των θέσεων δεν είναι εγγυημένη 100%! | Δημοσιεύστε μια θέση που αδειάζει | Βοηθήστε την κοινότητα!
        </div>
    </div>

    <div class="controls-container">
        <div class="menu-btn" onclick="toggleMenu()">☰ Μενού</div>
        <div class="my-location-btn" onclick="resetUserMarker()">📍 Επαναφορά μου</div>
    </div>

    <div id="menu-overlay">
        <div class="close-menu" onclick="toggleMenu()">✖ Κλείσιμο</div>
        <h2>Μενού</h2>
        <ul style="list-style: none; padding: 0;">
            <li onclick="alert('Οδηγίες: Κάνε κλικ στον χάρτη για να ορίσεις θέση!')" style="padding:10px 0; border-bottom:1px solid #ccc;">ℹ️ Οδηγίες Χρήσης</li>
            <li onclick="alert('Koinon Parking - 2026')" style="padding:10px 0; border-bottom:1px solid #ccc;">👥 Σχετικά με εμάς</li>
            <li onclick="alert('Όροι: Υπεύθυνη χρήση.')" style="padding:10px 0; border-bottom:1px solid #ccc;">📜 Όροι Χρήσης</li>
        </ul>
    </div>

    <div id="map"></div>
    
    <script>
        const API_BASE_URL = "https://parking-mhsn.onrender.com";
        var map = L.map('map', { maxZoom: 19, minZoom: 3 }).setView([39.6384, 22.4152], 16);
        var savedPosition = null;
        var markers = [];
        var userMarker = null;
        var savedMarker = null;
        var lastClickedMarker = null;

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles © Esri',
            maxZoom: 19
        }).addTo(map);

        window.addEventListener('resize', () => map.invalidateSize());

        function toggleMenu() {
            const menu = document.getElementById('menu-overlay');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function showSavedMarker() {
            if (savedPosition) {
                if (savedMarker) map.removeLayer(savedMarker);

                let popupContent = `
                    <div style="text-align:center;">
                        <b>Αποθηκευμένη θέση</b><br>
                        <input type="file" id="savedPhotoInput" accept="image/*" style="width:100%; margin:5px 0;">
                        <button class="btn-action" onclick="submitSavedWithPhoto()">📢 Δημοσίευσε Τώρα</button>
                        <button class="occupy-btn" onclick="deleteSavedMarker()">🗑️ Διαγραφή</button>
                    </div>`;
                
                savedMarker = L.marker([savedPosition.lat, savedPosition.lng], {
                    icon: L.icon({
                        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-gold.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41]
                    })
                }).addTo(map).bindPopup(popupContent);
            }
        }

        function submitSavedWithPhoto() {
            const file = document.getElementById('savedPhotoInput').files[0];
            let mins = prompt("Πόσα λεπτά θα είσαι ελεύθερος;", "10");
            if (mins) {
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        sendToServer(savedPosition.lat, savedPosition.lng, mins, reader.result);
                        deleteSavedMarker();
                    };
                    reader.readAsDataURL(file);
                } else {
                    sendToServer(savedPosition.lat, savedPosition.lng, mins, null);
                    deleteSavedMarker();
                }
            }
        }

        function deleteSavedMarker() {
            localStorage.removeItem('savedLat');
            localStorage.removeItem('savedLng');
            if (savedMarker) map.removeLayer(savedMarker);
            savedMarker = null;
            savedPosition = null;
            map.closePopup();
        }

        function loadSavedPosition() {
            const lat = localStorage.getItem('savedLat');
            const lng = localStorage.getItem('savedLng');
            if (lat && lng) {
                savedPosition = { lat: parseFloat(lat), lng: parseFloat(lng) };
            }
        }

        function resetUserMarker() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    if (userMarker) {
                        userMarker.setLatLng([lat, lng]);
                    } else {
                        userMarker = L.marker([lat, lng], { draggable: true }).addTo(map);
                    }
                    userMarker.bindPopup(getUserPopupContent()).openPopup();
                    map.setView([lat, lng], 17);
                }, null, { enableHighAccuracy: true });
            }
        }

        function getUserPopupContent() {
            let html = `<div style="text-align:center;"><b>Είσαι εδώ!</b><br>
                <button class="save-btn" onclick="saveCurrentLocation()">💾 Αποθήκευση θέσης</button>
                <input type="file" id="photoInput" accept="image/*" style="width:100%; margin:5px 0;">
                <button class="btn-action" onclick="submitPosition(true)">📢 Δημοσίευσε Τώρα</button></div>`;
            return html;
        }

        function saveCurrentLocation() {
            let pos = userMarker.getLatLng();
            localStorage.setItem('savedLat', pos.lat);
            localStorage.setItem('savedLng', pos.lng);
            savedPosition = pos;
            showSavedMarker();
            alert("Η θέση αποθηκεύτηκε!");
            userMarker.closePopup();
        }

        function submitPosition(isUserMarker) {
            let pos;
            let fileInput;

            if (isUserMarker) {
                pos = userMarker.getLatLng();
                fileInput = document.getElementById('photoInput');
            } else {
                if (!lastClickedMarker) return;
                pos = lastClickedMarker.getLatLng();
                fileInput = document.getElementById('clickPhotoInput');
            }

            const file = fileInput.files[0];
            let mins = prompt("Πόσα λεπτά θα είσαι ελεύθερος;", "10");
            
            if (mins) {
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        sendToServer(pos.lat, pos.lng, mins, reader.result);
                        if (!isUserMarker) cancelClickedMarker();
                    };
                    reader.readAsDataURL(file);
                } else { 
                    sendToServer(pos.lat, pos.lng, mins, null);
                    if (!isUserMarker) cancelClickedMarker();
                }
            }
        }

        map.on('click', function(e) {
            if (lastClickedMarker) map.removeLayer(lastClickedMarker);
            
            lastClickedMarker = L.marker(e.latlng, { draggable: true }).addTo(map);
            
            let popupContent = `
                <div style="text-align:center; width: 180px;">
                    <b>Νέα θέση</b><br>
                    <button class="save-btn" style="margin-top:5px; width:100%;" onclick="saveClickedLocation()">💾 Αποθήκευση</button><br>
                    <input type="file" id="clickPhotoInput" accept="image/*" style="width:100%; margin:8px 0;"><br>
                    <button class="btn-action" style="margin-top:5px; width:100%;" onclick="submitPosition(false)">📢 Δημοσίευσε</button>
                    <button class="occupy-btn" style="margin-top:5px; width:100%;" onclick="cancelClickedMarker()">✖️ Ακύρωση</button>
                </div>
            `;
            
            lastClickedMarker.bindPopup(popupContent);
            lastClickedMarker.openPopup();
            lastClickedMarker.bringToFront();
            L.DomEvent.disableClickPropagation(lastClickedMarker._popup._container);
        });

        function cancelClickedMarker() {
            if (lastClickedMarker) map.removeLayer(lastClickedMarker);
            lastClickedMarker = null;
            map.closePopup();
        }

        function saveClickedLocation() {
            let pos = lastClickedMarker.getLatLng();
            localStorage.setItem('savedLat', pos.lat);
            localStorage.setItem('savedLng', pos.lng);
            savedPosition = pos;
            showSavedMarker();
            alert("Η θέση αποθηκεύτηκε!");
            lastClickedMarker.closePopup();
        }

        async function sendToServer(lat, lng, mins, photo) {
            await fetch(`${API_BASE_URL}/free-spot`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: 1, latitude: lat, longitude: lng, minutes_until_free: parseInt(mins), photo: photo})
            });
            map.closePopup();
            loadSpots();
        }

        async function loadSpots() {
            let res = await fetch(`${API_BASE_URL}/search-spots?user_id=1`);
            let data = await res.json();
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            data.spots.forEach(spot => {
                let created = new Date(spot.created_at + "Z");
                let remaining = spot.minutes_until_free - Math.floor((new Date() - created) / 60000);
                if (remaining > 0) {
                    let color = remaining <= 3 ? 'red' : 'green';
                    let icon = L.icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });
                    let photoHtml = spot.photo ? `<img src="${spot.photo}" class="photo-preview"><br>` : "";
                    let marker = L.marker([spot.latitude, spot.longitude], {icon: icon}).addTo(map)
                        .bindPopup(`${photoHtml}<b>Λήγει σε: ${remaining} λεπτά</b><br><button class="nav-btn" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=$${spot.latitude},${spot.longitude}')">🚗 Οδηγίες</button><button class="occupy-btn" onclick="occupySpot(${spot.id})">❌ Κατειλημμένη</button>`);
                    markers.push(marker);
                }
            });
        }

        async function occupySpot(id) {
            await fetch(`${API_BASE_URL}/occupy-spot/${id}`, { method: 'DELETE' });
            loadSpots();
        }

        function resizeAndCompress(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        }

        loadSavedPosition();
        showSavedMarker();
        resetUserMarker();
        loadSpots();
        setInterval(loadSpots, 5000);
    </script>
</body>
</html>
